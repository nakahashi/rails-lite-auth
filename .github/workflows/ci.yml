name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop -f github

  rspec:
    runs-on: ubuntu-latest
    needs: rubocop
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: DB setup
        env:
          RAILS_ENV: test
        run: bundle exec rails db:test:prepare

      - name: RSpec
        env:
          RAILS_ENV: test
        run: bundle exec rspec
